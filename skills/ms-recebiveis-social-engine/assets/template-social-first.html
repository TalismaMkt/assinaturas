<!doctype html>
<html lang="pt-BR" data-theme="ms-social">
<head>
  <meta charset="utf-8">
  <title>{{DECK_TITLE}} · MS Recebíveis</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Raleway:wght@700;800&display=swap">
  <style>
    :root,
    [data-theme="ms-social"] {
      --paper: #f6f2ea;
      --paper-2: #efe7db;
      --ink: #151923;
      --muted: #5f6774;
      --accent: #bf2f39;
      --line: rgba(17,24,39,.08);
      --panel: #ffffff;
    }

    :root {
      --display: "Raleway", Arial, Helvetica, sans-serif;
      --sans: "Inter", Arial, Helvetica, sans-serif;
    }

    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: #17191f;
      font-family: var(--sans);
      color: var(--ink);
      padding: 40px 24px 80px;
    }

    .sheet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .poster {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(to bottom, var(--paper), #fcfbf9 70%);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,.04);
      box-shadow: 0 28px 80px rgba(0,0,0,.28);
      display: grid;
      grid-template-rows: 1fr 0.95fr;
    }

    .top {
      padding: 58px 64px 42px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-kicker {
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #8a8178;
      font-weight: 700;
    }

    .brand-mark {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(191,47,57,.12);
      flex: 0 0 auto;
    }

    .text-block {
      max-width: 850px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #8a8178;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .headline {
      font-family: var(--display);
      font-size: 82px;
      line-height: .94;
      letter-spacing: -.045em;
      color: var(--ink);
      margin: 0 0 22px;
      text-wrap: balance;
    }

    .copy {
      font-size: 28px;
      line-height: 1.5;
      color: #374151;
      margin: 0;
      max-width: 760px;
      text-wrap: pretty;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 30px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .meta-label {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #8a8178;
      font-weight: 700;
    }

    .meta-value {
      font-size: 16px;
      color: #4b5563;
      font-weight: 600;
    }

    .bottom {
      position: relative;
      overflow: hidden;
      border-top: 1px solid rgba(17,24,39,.06);
      background: #ddd;
    }

    .bottom img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bottom::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.18), transparent 30%);
      pointer-events: none;
    }

    .poster.no-image .bottom {
      background:
        radial-gradient(circle at top right, rgba(191,47,57,0.08), transparent 20%),
        linear-gradient(to bottom, #f0ebe2, #e8dfd2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px;
    }

    .closing-card {
      width: min(100%, 760px);
      border-radius: 28px;
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(17,24,39,.08);
      box-shadow: 0 18px 40px rgba(15,23,42,.06);
      padding: 32px 34px;
    }

    .closing-card .small {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #8a8178;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .closing-card .value {
      font-size: 34px;
      line-height: 1.28;
      color: var(--ink);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="sheet">
    <!-- POSTERS_HERE -->
  </main>
</body>
</html>
